
<style>
:root{--bg:#0b0f14;--muted:#7f93a8;--txt:#e8f0fb;--accent:#4aa3ff;--accent2:#35d07f;--bdr:rgba(255,255,255,.08);--shadow:0 8px 20px rgba(0,0,0,.4);}
*{box-sizing:border-box;}
.shell{background:var(--bg);border-radius:14px;padding:16px;font-family:system-ui,sans-serif;color:var(--txt);}
header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;}
h1{margin:0;font-size:16px;font-weight:500;}
.sub{font-size:11px;color:var(--muted);margin-top:3px;}
.pill{font-size:11px;color:var(--accent2);border:1px solid rgba(53,208,127,.3);padding:5px 10px;border-radius:999px;background:rgba(53,208,127,.08);}
.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px;}
.card{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;}
.head{display:flex;justify-content:space-between;align-items:center;padding:11px 13px 9px;border-bottom:1px solid var(--bdr);}
.title{font-size:12px;display:flex;align-items:center;gap:8px;}
.ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.05);}
.ico svg{width:16px;height:16px;stroke:var(--txt);fill:none;stroke-width:2;}
.hint{font-size:10px;color:var(--muted);}
.padwrap{padding:12px;display:flex;justify-content:center;}
.joy{width:220px;height:220px;border-radius:16px;background:rgba(0,0,0,.22);border:1px solid var(--bdr);position:relative;}
.joy::before{content:"";position:absolute;inset:12px;border-radius:12px;border:1px dashed rgba(255,255,255,.10);}
.crossline{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.5;}
.crossline svg{width:75%;height:75%;}
.knob{width:60px;height:60px;border-radius:50%;background:rgba(74,163,255,.22);border:1px solid rgba(255,255,255,.16);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);}
.readout{display:flex;gap:8px;padding:0 12px 12px;}
.kv{flex:1;border:1px solid var(--bdr);border-radius:10px;padding:7px 10px;background:rgba(0,0,0,.18);}
.k{font-size:10px;color:var(--muted);}
.v{font-size:14px;margin-top:2px;}
.toggles{padding:12px;display:grid;gap:9px;}
.btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;border-radius:12px;border:1px solid var(--bdr);background:rgba(0,0,0,.18);color:var(--txt);font-size:12px;}
.btn.on{border-color:rgba(53,208,127,.5);background:rgba(53,208,127,.09);}
.ls{display:flex;align-items:center;gap:9px;}
.sw{width:40px;height:22px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);position:relative;flex-shrink:0;}
.dot{width:17px;height:17px;border-radius:50%;background:rgba(255,255,255,.2);position:absolute;top:50%;left:2px;transform:translateY(-50%);}
.btn.on .sw{background:rgba(53,208,127,.15);border-color:rgba(53,208,127,.5);}
.btn.on .dot{left:19px;background:rgba(53,208,127,.7);}
footer{font-size:10px;color:var(--muted);padding:8px 2px 0;display:flex;justify-content:space-between;}
a{color:var(--accent);}
</style>
<div class="shell">
  <header>
    <div>
      <h1>Robot Remote</h1>
      <div class="sub">Drive with the touch pad · Toggle actuators on the right</div>
    </div>
    <div class="pill">Connected</div>
  </header>
  <div class="grid">
    <div class="card">
      <div class="head">
        <div class="title">
          <div class="ico"><svg viewBox="0 0 24 24"><path d="M7 14l-2 6"/><path d="M17 14l2 6"/><path d="M6 14h12l-1.5-6h-9z"/><path d="M8 14v-2"/><path d="M16 14v-2"/></svg></div>
          Drive
        </div>
        <div class="hint">touch + drag</div>
      </div>
      <div class="padwrap">
        <div class="joy">
          <div class="crossline">
            <svg viewBox="0 0 100 100" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="2">
              <path d="M50 8v84"/><path d="M8 50h84"/>
              <path d="M50 16l-5 5m5-5l5 5"/>
              <path d="M50 84l-5-5m5 5l5-5"/>
              <path d="M16 50l5-5m-5 5l5 5"/>
              <path d="M84 50l-5-5m5 5l-5 5"/>
            </svg>
          </div>
          <div class="knob"></div>
        </div>
      </div>
      <div class="readout">
        <div class="kv"><div class="k">Left</div><div class="v">0</div></div>
        <div class="kv"><div class="k">Right</div><div class="v">0</div></div>
        <div class="kv"><div class="k">Link</div><div class="v" style="color:var(--accent2)">OK</div></div>
      </div>
    </div>
    <div class="card">
      <div class="head">
        <div class="title">
          <div class="ico"><svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/><path d="M7 7v10"/><path d="M17 12v5"/></svg></div>
          Actuators
        </div>
        <div class="hint">tap to toggle</div>
      </div>
      <div class="toggles">
        <div class="btn on">
          <div class="ls">
            <div class="ico"><svg viewBox="0 0 24 24"><path d="M4 15h16"/><path d="M6 15v5"/><path d="M10 15v5"/><path d="M14 15v5"/><path d="M18 15v5"/><path d="M5 11c2-2 4-2 7 0s5 2 7 0"/></svg></div>
            Wide brush
          </div>
          <div class="sw"><div class="dot"></div></div>
        </div>
        <div class="btn">
          <div class="ls">
            <div class="ico"><svg viewBox="0 0 24 24"><path d="M6 6l12 12"/><path d="M6 12h6"/><path d="M12 18v-6"/><path d="M4 4l4 2-2 4-4-2z"/></svg></div>
            Corner brush
          </div>
          <div class="sw"><div class="dot"></div></div>
        </div>
        <div class="btn on">
          <div class="ls">
            <div class="ico"><svg viewBox="0 0 24 24"><path d="M12 3v6"/><path d="M8 7l4 4 4-4"/><path d="M6 14c2-2 10-2 12 0"/><path d="M7 18c3 2 7 2 10 0"/></svg></div>
            Blower / sucker
          </div>
          <div class="sw"><div class="dot"></div></div>
        </div>
      </div>
    </div>
  </div>
  <footer>
    <div>Tip: Add to home screen for full-screen remote</div>
    <a href="#">/status</a>
  </footer>
</div>
